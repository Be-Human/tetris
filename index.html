<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>俄罗斯方块</h1>
        <div class="game-wrapper">
            <div class="game-board">
                <canvas id="gameCanvas" width="300" height="600"></canvas>
            </div>
            <div class="game-info">
                <div class="info-panel stats-panel">
                    <div class="stat-item">
                        <h3>得分</h3>
                        <div class="score" id="score">0</div>
                    </div>
                    <div class="stat-item">
                        <h3>最高分</h3>
                        <div class="high-score" id="highScore">0</div>
                    </div>
                    <div class="stat-item">
                        <h3>等级</h3>
                        <div class="level" id="level">1</div>
                    </div>
                </div>
                <div class="info-panel">
                    <h2>Hold</h2>
                    <canvas id="holdCanvas" width="100" height="100"></canvas>
                </div>
                <div class="info-panel">
                    <h2>下一个</h2>
                    <canvas id="nextCanvas" width="100" height="100"></canvas>
                </div>
                <div class="info-panel">
                    <h2>操作说明</h2>
                    <ul>
                        <li>← →：左右移动</li>
                        <li>↑：旋转</li>
                        <li>↓：加速下落</li>
                        <li>空格：直接下落</li>
                        <li>C：暂存方块</li>
                    </ul>
                </div>
                <div class="info-panel settings-panel">
                    <div class="setting-item">
                        <span class="setting-label">难度</span>
                        <select id="difficultySelect" class="difficulty-select">
                            <option value="easy">简单</option>
                            <option value="normal" selected>普通</option>
                            <option value="hard">困难</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <span class="setting-label">炸弹方块</span>
                        <label class="toggle-switch">
                            <input type="checkbox" id="bombModeToggle">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <div class="setting-item">
                        <span class="setting-label">幽灵方块</span>
                        <label class="toggle-switch">
                            <input type="checkbox" id="ghostPieceToggle" checked>
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                </div>
                <button id="startBtn" class="btn">开始游戏</button>
                <button id="pauseBtn" class="btn" style="display: none;">暂停</button>
            </div>
        </div>
        <div id="gameOver" class="game-over" style="display: none;">
            <div class="game-over-content">
                <h2>游戏结束</h2>
                <div id="newRecord" class="new-record" style="display: none;">🎉 新纪录！</div>
                <p>最终得分: <span id="finalScore">0</span></p>
                <button id="restartBtn" class="btn">重新开始</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
